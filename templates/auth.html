<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizAI - Connexion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">

            <div class="auth-logo">
                <span class="logo-text">QuizAI</span>
            </div>

            <!-- FORMULAIRE CONNEXION -->
            <div id="loginForm">
                <h2 class="auth-title">Connexion</h2>
                {% if error %}
                <p class="error-message">{{ error }}</p>
                {% endif %}
                <form method="POST" action="/login">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="ton@email.com" required />
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" name="mot_de_passe" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        Se connecter
                    </button>
                </form>
                <p class="auth-switch">
                    Pas encore de compte ?
                    <a href="#" id="switchToRegister">S'inscrire</a>
                </p>
            </div>

            <!-- FORMULAIRE INSCRIPTION -->
            <div id="registerForm" style="display:none;">
                <h2 class="auth-title">Inscription</h2>
                <form method="POST" action="/register">
                    <div class="form-group">
                        <label>Nom complet</label>
                        <input type="text" name="nom" placeholder="Ton nom complet" required />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="ton@email.com" required />
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" name="mot_de_passe" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        S'inscrire
                    </button>
                </form>
                <p class="auth-switch">
                    Déjà un compte ?
                    <a href="#" id="switchToLogin">Se connecter</a>
                </p>
            </div>

        </div>
    </div>

    <script>
        // Quand on clique sur "S'inscrire"
        document.getElementById('switchToRegister').addEventListener('click', function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        });

        // Quand on clique sur "Se connecter"
        document.getElementById('switchToLogin').addEventListener('click', function() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        });
    </script>
</body>
</html>
